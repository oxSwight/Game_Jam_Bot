# POSTGRES_PASSWORD comes from .env (compose interpolates it) - no default on
# purpose, so a deployment can't silently run on a well-known password.
services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override the .env defaults to point at the compose services.
      DATABASE_URL: postgresql+asyncpg://gamejam:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/gamejam
      REDIS_URL: redis://redis:6379/0
      FSM_STORAGE: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamejam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: gamejam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamejam"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
